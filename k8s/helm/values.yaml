main:
  image:
    registry: docker.io
    repository: cloudogu/ces-importer
    tag: 0.0.1-1747032004-1747031846
  imagePullSecrets:
    - name: "ces-container-registries"
  imagePullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi
job:
  image:
    registry: docker.io
    repository: cloudogu/ces-importer
    tag: 0.0.1-1747032004-1747031846
  imagePullSecrets:
    - name: "ces-container-registries"
  imagePullPolicy: IfNotPresent
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
config:
  logging:
    # valid values are: DEBUG, INFO, WARN, ERROR
    level: DEBUG
  api:
    # host configures the FQDN under which the exporter will be available for CES data export. The importer will
    # contact the exporter API which returns all required data like data paths etc.
    # The exporter API endpoint is fixed and will be routed on source side.
    host: classic-ces.exporter
    # secretName contains the secret with the exporter API key
    secretName: "ces-exporter-secret"
    # secretDataKey contains the key name that accommodates the actual exporter API key as value.
    secretDataKey: "apiKey"
    # apiKey is the actual api key read from the specified env var.
    apiKey: "${API_KEY}"
  ssh:
    # secretName contains the name of the secret that contains the SSH private key which the importer will use to access the source system.
    secretName: "ces-importer-secret"
    # secretDataKey contains the key name that accommodates the actual exporter SSH private key as value.
    secretDataKey: "privateKey"
    # user is the user used for ssh login at the exporter
    user: "root"
    # privateKeyPath is the path to which the private key gets mounted within the container.
    privateKeyPath: "/.ssh/privateKey"
  migration:
    # regularSchedule triggers recurring migration jobs while the whole source system is running.
    # Uses CRON notation like "0 4 * * *"
    regularSchedule: "0 4 * * *"
    # finalSchedule triggers the finishing migration job while the source system is supposed to be void of active
    # users.
    # Uses RFC 3339 notation like 2025-04-03 12:34:56Z
    finalSchedule: "2025-04-03 12:34:56Z"
  job:
    # doguVolumeBasePath is the path to which dogu volumes are mounted.
    doguVolumeBasePath: "/data"
    # exclude contains dogus with a pattern to exclude specific files during the import
    # example:
    #   exclude:
    #   - dogu: "jenkins"
    #     pattern: "EXCLUDE_PATTERN"
    exclude: []
controllerManager:
  image:
    tag: 0.0.1
image:
  tag: 0.0.1
