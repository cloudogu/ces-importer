apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "ces-importer.name" . }}-pv-manager-role-binding
subjects:
  - kind: ServiceAccount
    name: '{{ include "ces-importer.name" . }}-main-manager'
    namespace: '{{ .Release.Namespace }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: '{{ include "ces-importer.name" . }}-pv-manager-role'