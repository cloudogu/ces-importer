apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ces-importer.name" . }}-main-role
  labels:
    {{- include "ces-importer.labels" . | nindent 4 }}
rules:
  # allow starting + stopping of dogus
- apiGroups:
    - k8s.cloudogu.com/v2
  resources:
    - dogus
  verbs:
    - get
    - update
