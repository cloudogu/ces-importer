apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ces-importer.name" . }}-main-manager-role
  labels:
    {{- include "ces-importer.labels" . | nindent 4 }}
rules:
  # allow starting + stopping of dogus
- apiGroups:
    - k8s.cloudogu.com
  resources:
    - dogus
  verbs:
    - get
    - update
  # allow for systeminfo comparison and storage size update
- apiGroups:
    - k8s.cloudogu.com
  resources:
    - dogus
  verbs:
    - get
    - list
    - update
# allow to inspect pvc size
- apiGroups: [""]
  resources:
    - persistentvolumeclaims
  verbs:
    - get
  # allow for systeminfo comparison
- apiGroups:
  - k8s.cloudogu.com
  resources:
    - components
  verbs:
    - list