apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "ces-importer.name" . }}-main-role
  labels:
    {{- include "ces-importer.labels" . | nindent 4 }}
rules:
  # starting + stopping of dogus
- apiGroups:
    - apps
  resources:
    - deployments
  verbs:
    - get
    - update
- apiGroups:
    - apps
  resources:
    - deployments/scale
  verbs:
    - update
