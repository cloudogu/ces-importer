apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "ces-importer.name" . }}-main-manager-role-binding
  labels:
    {{- include "ces-importer.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: '{{ include "ces-importer.name" . }}-main-manager-role'
subjects:
- kind: ServiceAccount
  name: '{{ include "ces-importer.name" . }}-main-manager'
  namespace: '{{ .Release.Namespace }}'
