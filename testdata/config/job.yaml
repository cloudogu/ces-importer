---
doguVolumeBasePath: "/data"
excludedGlobalConfigurationKeys:
  - "CONFIGURATION_EXCLUDE_1"
  - "CONFIGURATION_EXCLUDE_2"
excludedDoguConfigurationKeys:
  - dogu: "dogu1"
    keys:
      - "KEY_1"
      - "KEY_2"
  - dogu: "dogu2"
    keys:
      - "KEY_3"
excludedDogus:
  - "DOGU_EXCLUDE_1"
  - "DOGU_EXCLUDE_2"
exclude:
  - dogu: "jenkins"
    pattern:
      - "JENKINS_PATTERN"
  - dogu: "redmine"
    pattern:
      - "REDMINE_PATTERN_1"
      - "REDMINE_PATTERN_2"
verbose: true